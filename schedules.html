function showTournament(key, btn){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  const tournament = tournaments[key];

  document.getElementById("calendarArea").innerHTML =
    `<h2 class="schedule-title">${tournament.title}</h2>` +
    tournament.months.map(month => renderCalendar(month, tournament.title)).join("");
}

function renderCalendar(month, title){
  const weekdays = ["월","화","수","목","금","토","일"];
  let html = `
    <section class="calendar">
      <div class="calendar-header">${title} — ${month.title} (한국시간 기준)</div>
      <div class="weekdays">
        ${weekdays.map(day=>`<div>${day}</div>`).join("")}
      </div>
      <div class="days">
  `;

  for(let i=1; i<month.firstDay; i++){
    html += `<div class="day empty"></div>`;
  }

  for(let d=1; d<=month.days; d++){
    const dayGames = month.games[d] || [];
    const isSunday = ((month.firstDay + d - 2) % 7) === 6;

    html += `
      <div class="day ${isSunday ? "sunday" : ""}">
        <div class="date">${d}</div>
        ${dayGames.map(game=>`
          <div class="game ${game.cls}">
            <strong>${game.time}</strong> ${game.match}
            <br><span>${game.place}</span>
          </div>
        `).join("")}
      </div>
    `;
  }

  html += `
      </div>
    </section>
  `;

  return html;
}
