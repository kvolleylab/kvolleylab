name: Rebuild final 229-player Player Master

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/rebuild-final-player-master-229.yml'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Merge all reviewed university batches and validate 229 players
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          master_path = Path('data/master/player_master.json')
          seed_dir = Path('data/seed')
          output_path = Path('data/master/player_master_229_v2.json')

          merged_by_id = {}

          # Preserve the original Inha records and any already-correct reviewed rows.
          current = json.loads(master_path.read_text(encoding='utf-8'))
          for row in current:
              pid = row.get('system', {}).get('player_id')
              if pid:
                  merged_by_id[pid] = row

          batch_paths = sorted(seed_dir.glob('player_master_registration_batch_*_2026_v1.json'))
          batch_paths = [p for p in batch_paths if p.name != 'player_master_registration_batch_univ_2026_v1.json']
          assert len(batch_paths) >= 14, f'found only {len(batch_paths)} individual batch files'

          loaded = {}
          for path in batch_paths:
              rows = json.loads(path.read_text(encoding='utf-8'))
              loaded[path.name] = len(rows)
              for row in rows:
                  pid = row['system']['player_id']
                  merged_by_id[pid] = row

          expected_ids = [f'KVL-P-{n:06d}' for n in range(1, 230)]
          actual_ids = sorted(merged_by_id)
          missing = [pid for pid in expected_ids if pid not in merged_by_id]
          extra = [pid for pid in actual_ids if pid not in set(expected_ids)]

          assert not missing, f'missing IDs: {missing}'
          assert not extra, f'extra IDs: {extra}'
          assert actual_ids == expected_ids, f'ID sequence mismatch: count={len(actual_ids)}'

          merged = [merged_by_id[pid] for pid in expected_ids]
          assert len(merged) == 229
          assert len({p['system']['player_id'] for p in merged}) == 229
          assert all(p['system'].get('status') == 'active' for p in merged)
          assert all(p['system'].get('data_confidence') == 'reviewed' for p in merged)
          assert all(p['system'].get('id_status') == 'permanent' for p in merged)
          assert all(p.get('identity', {}).get('name_ko') for p in merged)

          output_path.write_text(
              json.dumps(merged, ensure_ascii=False, separators=(',', ':')) + '\n',
              encoding='utf-8'
          )

          for html_path in (Path('players.html'), Path('player.html')):
              text = html_path.read_text(encoding='utf-8')
              text = text.replace('data/master/player_master_229_v1.json', 'data/master/player_master_229_v2.json')
              html_path.write_text(text, encoding='utf-8')

          print(json.dumps({
              'starting_master_count': len(current),
              'batch_counts': loaded,
              'player_count': len(merged),
              'first_id': merged[0]['system']['player_id'],
              'last_id': merged[-1]['system']['player_id'],
              'output': str(output_path),
          }, ensure_ascii=False, indent=2))
          PY

      - name: Commit rebuilt Player Master
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/master/player_master_229_v2.json players.html player.html
          git commit -m 'Rebuild verified 229-player Player Master v2' || exit 0
          git push origin HEAD:main

# Trigger revision: 3
