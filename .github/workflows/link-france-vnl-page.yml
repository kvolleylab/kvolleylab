name: Link France VNL page
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/link-france-vnl-page.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Link France page from VNL hub
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('vnl.html')
          s=p.read_text(encoding='utf-8')
          old='<a class="team-card" href="schedules.html?tournament=vnl&team=프랑스"><img class="flag-img" src="https://flagcdn.com/w160/fr.png" alt="France flag"><div class="team-name">France</div><div class="status">DB Status: Building</div><div class="status">국가 일정 바로가기</div></a>'
          new='<a class="team-card" href="france.html"><img class="flag-img" src="https://flagcdn.com/w160/fr.png" alt="France flag"><div class="team-name">France</div><div class="status">DB Status: Complete</div><div class="status">국가 선수 페이지 연결</div></a>'
          s=s.replace(old,new)
          entry='<a class="entry-card" href="france.html"><span class="badge">ACTIVE ENTRY</span><strong>France</strong><p>Active 14명과 Reserve 1명을 연결합니다.</p><div class="card-actions"><span>Active 14</span><span>Reserve 1</span><span>선수 상세</span></div></a>'
          anchor='<a class="entry-card" href="cuba.html"><span class="badge">ACTIVE ENTRY</span><strong>Cuba</strong><p>Active 15명 엔트리를 연결합니다.</p><div class="card-actions"><span>Active 15</span><span>Reserve 0</span><span>선수 상세</span></div></a>'
          if entry not in s:s=s.replace(anchor,anchor+'\n      '+entry)
          player='<a class="hub-card" href="france.html"><span class="badge">NATIONAL TEAM</span><strong>France Players</strong><p>프랑스 대표팀 Active·Reserve 엔트리를 확인합니다.</p></a>'
          anchor='<a class="hub-card" href="cuba.html"><span class="badge">NATIONAL TEAM</span><strong>Cuba Players</strong><p>쿠바 대표팀 Active 엔트리를 확인합니다.</p></a>'
          if player not in s:s=s.replace(anchor,anchor+'\n       '+player)
          p.write_text(s,encoding='utf-8')
          assert 'href="france.html"' in s and 'France Players' in s
          PY
      - name: Commit France hub links
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add vnl.html
          git commit -m 'Connect France Active entry to VNL hub' || exit 0
          git push origin HEAD:main
