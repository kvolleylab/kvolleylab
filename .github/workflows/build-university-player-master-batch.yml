name: Build university Player Master batch

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build registration batch
        run: python scripts/build_university_player_master_batch.py

      - name: Upload generated batch
        uses: actions/upload-artifact@v4
        with:
          name: university-player-master-batch-v1
          path: data/seed/player_master_registration_batch_univ_2026_v1.json
          if-no-files-found: error
          retention-days: 7

      - name: Commit generated batch
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'data/seed/player_master_registration_batch_univ_2026_v1.json';
            const content = fs.readFileSync(path).toString('base64');
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'Generate 207-player university Player Master batch v1',
              content,
              branch: context.payload.pull_request.head.ref
            });
