name: Build university Player Master batch

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build and validate registration batch
        run: python scripts/build_university_player_master_batch.py

      - name: Inspect generated file
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('data/seed/player_master_registration_batch_univ_2026_v1.json')
          rows = json.loads(path.read_text(encoding='utf-8'))
          ids = [row['system']['player_id'] for row in rows]
          print(f'Generated records: {len(rows)}')
          print(f'ID range: {ids[0]} through {ids[-1]}')
          print(f'Unique IDs: {len(set(ids))}')
          PY

      - name: Commit generated batch
        run: |
          if git diff --quiet -- data/seed/player_master_registration_batch_univ_2026_v1.json; then
            echo 'Generated batch is already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/seed/player_master_registration_batch_univ_2026_v1.json
          git commit -m 'Generate 207-player university Player Master batch v1'
          git push origin HEAD:${{ github.head_ref }}
