name: Build university Player Master batch

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build registration batch
        id: build
        continue-on-error: true
        run: |
          python scripts/build_university_player_master_batch.py > university_batch_build.log 2>&1
          code=$?
          cat university_batch_build.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

      - name: Commit failure diagnostic
        if: steps.build.outputs.exit_code != '0'
        run: |
          mkdir -p docs/validation
          cp university_batch_build.log docs/validation/2026_university_player_master_batch_failure.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/validation/2026_university_player_master_batch_failure.log
          git commit -m 'Record university Player Master batch failure diagnostic' || true
          git push origin HEAD:${{ github.head_ref }}
          exit 1

      - name: Commit generated batch
        if: steps.build.outputs.exit_code == '0'
        run: |
          test -f data/seed/player_master_registration_batch_univ_2026_v1.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f data/seed/player_master_registration_batch_univ_2026_v1.json
          git commit -m 'Generate 207-player university Player Master batch v1' || true
          git push origin HEAD:${{ github.head_ref }}
