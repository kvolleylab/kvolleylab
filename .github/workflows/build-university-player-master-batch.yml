name: Build university Player Master batch

on:
  push:
    branches:
      - feature/univ-player-master-batch-run-v1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-batch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build registration batch
        run: python scripts/build_university_player_master_batch.py

      - name: Validate generated file
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('data/seed/player_master_registration_batch_univ_2026_v1.json')
          rows = json.loads(path.read_text(encoding='utf-8'))
          ids = [row['system']['player_id'] for row in rows]
          expected = [f'KVL-P-{n:06d}' for n in range(17, 224)]

          assert len(rows) == 207, len(rows)
          assert ids == expected
          assert len(ids) == len(set(ids))
          assert all(row['system']['status'] == 'pending_review' for row in rows)
          assert all(row['system']['id_status'] == 'proposed' for row in rows)
          print('Validated 207 records and continuous IDs KVL-P-000017 through KVL-P-000223')
          PY

      - name: Commit generated batch
        run: |
          if git diff --quiet -- data/seed/player_master_registration_batch_univ_2026_v1.json; then
            echo 'Generated batch is already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/seed/player_master_registration_batch_univ_2026_v1.json
          git commit -m 'Generate 207-player university Player Master batch v1'
          git push
