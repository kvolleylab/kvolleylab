name: Finalize university Player Master

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Merge final university batches
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          master_path = Path('data/master/player_master.json')
          merged = {r['system']['player_id']: r for r in json.loads(master_path.read_text(encoding='utf-8'))}
          for path in ['data/seed/player_master_registration_batch_gyeongsang_2026_v1.json','data/seed/player_master_registration_batch_woosuk_2026_v1.json']:
              for row in json.loads(Path(path).read_text(encoding='utf-8')):
                  merged[row['system']['player_id']] = {k: row[k] for k in ('system','identity','physical','links','source_ids')}
          rows = sorted(merged.values(), key=lambda r: int(r['system']['player_id'].split('-')[-1]))
          master_path.write_text(json.dumps(rows, ensure_ascii=False, separators=(',', ':')) + '\n', encoding='utf-8')
          print(len(rows), rows[0]['system']['player_id'], rows[-1]['system']['player_id'])
          PY
      - name: Commit Player Master
        run: |
          git config user.name automation-bot
          git config user.email automation@example.com
          git add data/master/player_master.json
          git commit -m 'Finalize university Player Master at 229 players' || exit 0
          git push origin HEAD:${{ github.head_ref }}
