name: Connect USA Player Master v1
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/connect-usa-player-master-v1.yml'
permissions:
  contents: write
jobs:
  connect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Register USA players and add detail links
        run: |
          python - <<'PY'
          from pathlib import Path
          import json,re

          roster_path=Path('data/vnl/v25_usa_iran_slovenia_germany_serbia_turkiye.json')
          roster=json.loads(roster_path.read_text(encoding='utf-8'))
          usa=[p for p in roster if p.get('country')=='USA']
          assert len(usa)==18, f'USA roster count: {len(usa)}'

          masters=[]
          for idx,p in enumerate(usa,start=230):
            pid=f'KVL-P-{idx:06d}'
            p['player_id']=pid
            masters.append({
              'system':{
                'player_id':pid,
                'display_code':f"USA-{p.get('dob','').replace('-','')}",
                'created_at':'2026-07-13','updated_at':'2026-07-13',
                'status':'active','data_confidence':'reviewed','id_status':'permanent'
              },
              'identity':{
                'name_ko':p.get('korean',''),'name_en':p.get('name',''),'name_native':p.get('name',''),
                'gender':'M','nationality':'USA','birth_date':p.get('dob',''),
                'birth_year':int(p['dob'][:4]) if p.get('dob') else None,
                'birth_place':'','hand':'Unknown'
              },
              'physical':{'height_cm':p.get('height'),'weight_kg':None,'spike_cm':None,'block_cm':None},
              'volleyball':{'position':p.get('position',''),'national_team':'USA','entry_status':p.get('entryStatus','')},
              'links':{'volleybox':p.get('volleybox',''),'fivb_profile':p.get('vnlProfile',''),'kovo_profile':'','instagram':'','youtube':'','photo':''},
              'source_ids':['SRC-INT-VNL-2026-USA-V25']
            })

          roster_path.write_text(json.dumps(roster,ensure_ascii=False,indent=2),encoding='utf-8')
          master_path=Path('data/master/player_master_international_v1.json')
          master_path.write_text(json.dumps(masters,ensure_ascii=False,indent=2),encoding='utf-8')

          js_path=Path('assets/js/national-team.js')
          js=js_path.read_text(encoding='utf-8')
          old="<td>${p.name||p.fullName||''}</td>"
          new="<td>${p.player_id?`<a class=\"nt-player-link\" href=\"player.html?id=${encodeURIComponent(p.player_id)}\">${p.name||p.fullName||''}</a>`:(p.name||p.fullName||'')}</td>"
          if old not in js: raise RuntimeError('national team player cell pattern not found')
          js=js.replace(old,new)
          js_path.write_text(js,encoding='utf-8')

          css_path=Path('assets/css/national-team.css')
          css=css_path.read_text(encoding='utf-8')
          if '.nt-player-link' not in css:
            css+='\n.nt-player-link{color:inherit;font-weight:800;text-decoration:none}.nt-player-link:hover{color:var(--gold);text-decoration:underline}\n'
          css_path.write_text(css,encoding='utf-8')

          html_path=Path('player.html')
          html=html_path.read_text(encoding='utf-8')
          html=html.replace('const MASTER_URL = "data/master/player_master_229_v2.json";','const MASTER_URLS = ["data/master/player_master_229_v2.json","data/master/player_master_international_v1.json"];')
          old_fetch='fetch(MASTER_URL,{cache:"no-store"})\n  .then(response => {\n    if(!response.ok) throw new Error(`Player Master load failed: ${response.status}`);\n    return response.json();\n  })\n  .then(players => {'
          new_fetch='Promise.all(MASTER_URLS.map(url=>fetch(url,{cache:"no-store"}).then(response=>{if(!response.ok)throw new Error(`Player Master load failed: ${response.status}`);return response.json()})))\n  .then(groups => groups.flat())\n  .then(players => {'
          if old_fetch not in html: raise RuntimeError('player master fetch pattern not found')
          html=html.replace(old_fetch,new_fetch)
          html=html.replace('<div class="info-box"><div class="label">University</div><div class="value">${escapeHtml(schoolLabel(player))}</div></div>','<div class="info-box"><div class="label">Team / University</div><div class="value">${escapeHtml(player.volleyball?.national_team || schoolLabel(player))}</div></div>')
          html=html.replace('<div class="info-box"><div class="label">Nationality</div><div class="value">${escapeHtml(text(identity.nationality))}</div></div>','<div class="info-box"><div class="label">Nationality</div><div class="value">${escapeHtml(text(identity.nationality))}</div></div>\n        <div class="info-box"><div class="label">Position</div><div class="value">${escapeHtml(text(player.volleyball?.position))}</div></div>')
          html_path.write_text(html,encoding='utf-8')

          assert masters[0]['system']['player_id']=='KVL-P-000230'
          assert masters[-1]['system']['player_id']=='KVL-P-000247'
          PY
      - name: Commit USA Player Master connection
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/vnl/v25_usa_iran_slovenia_germany_serbia_turkiye.json data/master/player_master_international_v1.json assets/js/national-team.js assets/css/national-team.css player.html
          git commit -m 'Connect USA roster to Player Master and detail pages' || exit 0
          git push origin HEAD:main
