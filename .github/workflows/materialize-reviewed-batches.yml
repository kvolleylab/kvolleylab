name: Materialize reviewed batches

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Materialize prepared batches
        run: |
          for script in scripts/materialize_*_batch.py; do
            [ -f "$script" ] && python "$script"
          done
      - name: Commit generated files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/seed
          git commit -m 'Materialize reviewed registration batches' || exit 0
          git push origin HEAD:${{ github.head_ref }}
