name: Apply schedules light theme
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-schedules-light-theme.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Attach bright schedule stylesheet
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('schedules.html')
          s=p.read_text(encoding='utf-8')
          link='  <link rel="stylesheet" href="assets/css/schedules-light.css" />\n'
          if 'assets/css/schedules-light.css' not in s:
              s=s.replace('</head>', link+'</head>', 1)
          s=s.replace('<body>', '<body class="schedule-light-page">', 1)
          p.write_text(s,encoding='utf-8')
          assert 'assets/css/schedules-light.css' in s
          assert 'schedule-light-page' in s
          PY
      - name: Commit schedule light theme
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add schedules.html
          git commit -m 'Apply bright schedule calendar theme' || exit 0
          git push origin HEAD:main
# trigger-v2