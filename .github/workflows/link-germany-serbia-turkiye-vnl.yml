name: Link Germany Serbia Türkiye VNL pages
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/link-germany-serbia-turkiye-vnl.yml'
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Link pages from VNL hub
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('vnl.html')
          s=p.read_text(encoding='utf-8')
          team_anchor='<a class="team-card" href="slovenia.html"><img class="flag-img" src="https://flagcdn.com/w160/si.png" alt="Slovenia flag"><div class="team-name">Slovenia</div><div class="status">DB Status: Connected</div><div class="status">국가 선수 페이지 연결</div></a>'
          teams=[
          '<a class="team-card" href="germany.html"><img class="flag-img" src="https://flagcdn.com/w160/de.png" alt="Germany flag"><div class="team-name">Germany</div><div class="status">DB Status: Connected</div><div class="status">국가 선수 페이지 연결</div></a>',
          '<a class="team-card" href="serbia.html"><img class="flag-img" src="https://flagcdn.com/w160/rs.png" alt="Serbia flag"><div class="team-name">Serbia</div><div class="status">DB Status: Connected</div><div class="status">국가 선수 페이지 연결</div></a>',
          '<a class="team-card" href="turkiye.html"><img class="flag-img" src="https://flagcdn.com/w160/tr.png" alt="Türkiye flag"><div class="team-name">Türkiye</div><div class="status">DB Status: Connected</div><div class="status">국가 선수 페이지 연결</div></a>']
          for card in teams:
              if card not in s:
                  s=s.replace(team_anchor,team_anchor+'\n      '+card)
                  team_anchor=card
          entry_anchor='<a class="entry-card" href="slovenia.html"><span class="badge">ACTIVE ENTRY</span><strong>Slovenia</strong><p>v25 엔트리 데이터를 공통 시스템에 연결합니다.</p><div class="card-actions"><span>자동 계산</span><span>Active / Reserve</span><span>선수 상세</span></div></a>'
          cards=[
          '<a class="entry-card" href="germany.html"><span class="badge">ACTIVE ENTRY</span><strong>Germany</strong><p>v25 엔트리 데이터를 공통 시스템에 연결합니다.</p><div class="card-actions"><span>자동 계산</span><span>Active / Reserve</span><span>선수 상세</span></div></a>',
          '<a class="entry-card" href="serbia.html"><span class="badge">ACTIVE ENTRY</span><strong>Serbia</strong><p>v25 엔트리 데이터를 공통 시스템에 연결합니다.</p><div class="card-actions"><span>자동 계산</span><span>Active / Reserve</span><span>선수 상세</span></div></a>',
          '<a class="entry-card" href="turkiye.html"><span class="badge">ACTIVE ENTRY</span><strong>Türkiye</strong><p>v25 엔트리 데이터를 공통 시스템에 연결합니다.</p><div class="card-actions"><span>자동 계산</span><span>Active / Reserve</span><span>선수 상세</span></div></a>']
          for card in cards:
              if card not in s:
                  s=s.replace(entry_anchor,entry_anchor+'\n      '+card)
                  entry_anchor=card
          player_anchor='<a class="hub-card" href="slovenia.html"><span class="badge">NATIONAL TEAM</span><strong>Slovenia Players</strong><p>슬로베니아 대표팀 엔트리를 확인합니다.</p></a>'
          pcards=[
          '<a class="hub-card" href="germany.html"><span class="badge">NATIONAL TEAM</span><strong>Germany Players</strong><p>독일 대표팀 엔트리를 확인합니다.</p></a>',
          '<a class="hub-card" href="serbia.html"><span class="badge">NATIONAL TEAM</span><strong>Serbia Players</strong><p>세르비아 대표팀 엔트리를 확인합니다.</p></a>',
          '<a class="hub-card" href="turkiye.html"><span class="badge">NATIONAL TEAM</span><strong>Türkiye Players</strong><p>튀르키예 대표팀 엔트리를 확인합니다.</p></a>']
          for card in pcards:
              if card not in s:
                  s=s.replace(player_anchor,player_anchor+'\n       '+card)
                  player_anchor=card
          scheds=[
          '<a href="schedules.html?tournament=vnl&team=독일">독일</a>',
          '<a href="schedules.html?tournament=vnl&team=세르비아">세르비아</a>',
          '<a href="schedules.html?tournament=vnl&team=튀르키예">튀르키예</a>']
          sched_anchor='<a href="schedules.html?tournament=vnl&team=슬로베니아">슬로베니아</a>'
          for link in scheds:
              if link not in s:
                  s=s.replace(sched_anchor,sched_anchor+link)
                  sched_anchor=link
          p.write_text(s,encoding='utf-8')
          assert all(x in s for x in ['href="germany.html"','href="serbia.html"','href="turkiye.html"'])
          PY
      - name: Commit hub links
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add vnl.html
          git commit -m 'Connect Germany Serbia Türkiye pages to VNL hub' || exit 0
          git push origin HEAD:main
# trigger 2026-07-13
