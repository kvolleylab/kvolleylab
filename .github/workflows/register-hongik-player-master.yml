name: Register Hongik players in Player Master

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  register-hongik:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Register Hongik players
        run: python scripts/register_hongik_player_master.py

      - name: Validate final Player Master
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          rows = json.loads(Path('data/master/player_master.json').read_text(encoding='utf-8'))
          ids = [row['system']['player_id'] for row in rows]
          assert len(rows) == 48
          assert ids == [f'KVL-P-{n:06d}' for n in range(1, 49)]
          assert all(row['system']['status'] == 'active' for row in rows)
          assert all(row['system']['data_confidence'] == 'reviewed' for row in rows)
          assert all(row['system']['id_status'] == 'permanent' for row in rows)
          print('Validated 48 Player Master records through KVL-P-000048')
          PY

      - name: Commit updated Player Master
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'data/master/player_master.json';
            const content = fs.readFileSync(path).toString('base64');
            const branch = context.payload.pull_request.head.ref;
            const current = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              ref: branch
            });
            const existing = current.data.content.replace(/\n/g, '');
            if (existing === content) {
              core.info('Player Master is already up to date.');
              return;
            }
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'Register 16 Hongik players in Player Master v1',
              content,
              sha: current.data.sha,
              branch
            });
