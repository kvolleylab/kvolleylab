<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2026 단양대회 진출계산기 | K-Volley Lab</title><link rel="stylesheet" href="assets/css/style.css"><script src="assets/js/unified-nav.js" defer></script><style>body{margin:0;background:#f5f6f8;color:#111;font-family:Arial,sans-serif}.wrap{max-width:1180px;margin:auto;padding:24px 14px}.hero{background:#fff;border-radius:18px;padding:22px;margin:16px 0;box-shadow:0 2px 10px #0001}.hero h1{margin:0 0 8px}.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.card{background:#fff;border-radius:16px;padding:16px;margin:14px 0;box-shadow:0 2px 10px #0001}select,button{font:inherit;padding:9px 12px;border-radius:10px}button{border:0;background:#1f4e79;color:#fff;font-weight:800;cursor:pointer}.matches{display:grid;gap:10px}.match{padding:12px;border:1px solid #ddd;border-radius:12px}.score{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.score button{font-size:12px;background:#64748b}.score button.a{background:#116b2f}.score button.b{background:#9a1c1c}table{width:100%;border-collapse:collapse}th,td{padding:8px;border:1px solid #d0d3d8;text-align:center}th{background:#dce5f5}.top2{background:#dff4e5;font-weight:800}.target{background:#fff29d!important}.summary{padding:14px;border-radius:12px;font-size:20px;font-weight:900;text-align:center;background:#fff0c2}.note{color:#555;line-height:1.6}.table-wrap{overflow-x:auto}@media(max-width:700px){.wrap{padding:10px}th,td{font-size:12px;padding:6px}}</style>  <link rel="stylesheet" href="assets/css/site-theme-light.css" />
</head><body><header class="site-header"><a class="site-logo" href="index.html">K-Volley Lab</a><nav class="site-nav"></nav></header><main class="wrap"><section class="hero"><p class="eyebrow">Qualification Simulator</p><h1>2026 단양대회 남자부 본선 진출 계산기</h1><p class="note">순위 기준: 다승 → 득실점비율 → 세트득실율. 각 조 상위 2팀 진출. 원본 v11의 핵심 입력·순위 계산 구조를 K-Volley Lab 메뉴와 연결했습니다.</p><div class="controls"><label>조 <select id="group"></select></label><label>확인 팀 <select id="target"></select></label><button onclick="resetFuture()">미확정 초기화</button></div></section><section class="card"><h2>경기 결과 입력</h2><div id="matches" class="matches"></div></section><section class="card"><h2>자동 순위표</h2><div id="headline" class="summary"></div><div class="table-wrap"><table><thead><tr><th>순위</th><th>팀</th><th>승</th><th>패</th><th>득점</th><th>실점</th><th>득실점비율</th><th>세트득</th><th>세트실</th><th>세트득실율</th></tr></thead><tbody id="rank"></tbody></table></div></section></main><script>
const DATA={"A조":{teams:["대한항공","우리카드","한국전력","삼성화재","화성특례시청","영천시체육회"],matches:[["6/7","대한항공","영천시체육회",3,1],["6/7","우리카드","화성특례시청",1,3],["6/8","한국전력","삼성화재",1,3],["6/8","대한항공","화성특례시청",1,3],["6/9","우리카드","삼성화재",0,3],["6/9","한국전력","영천시체육회",3,0],["6/10","대한항공","우리카드",3,0],["6/10","화성특례시청","영천시체육회",3,0],["6/11","대한항공","한국전력",3,0],["6/11","삼성화재","화성특례시청",1,3],["6/12","우리카드","영천시체육회",null,null],["6/13","삼성화재","대한항공",null,null],["6/13","한국전력","화성특례시청",null,null],["6/14","우리카드","한국전력",null,null],["6/14","삼성화재","영천시체육회",null,null]]},"B조":{teams:["현대캐피탈","KB손해보험","OK저축은행","부산시체육회","국군체육부대"],matches:[["6/7","현대캐피탈","부산시체육회",0,3],["6/7","KB손해보험","OK저축은행",3,2],["6/8","현대캐피탈","국군체육부대",0,3],["6/9","OK저축은행","부산시체육회",3,1],["6/9","KB손해보험","국군체육부대",1,3],["6/10","현대캐피탈","KB손해보험",0,3],["6/11","OK저축은행","국군체육부대",1,3],["6/12","KB손해보험","부산시체육회",null,null],["6/13","현대캐피탈","OK저축은행",0,3],["6/14","부산시체육회","국군체육부대",null,null]]}};
const state={};const g=document.getElementById('group'),t=document.getElementById('target');Object.keys(DATA).forEach(x=>g.add(new Option(x,x)));g.value='B조';function setupTeams(){t.innerHTML='';DATA[g.value].teams.forEach(x=>t.add(new Option(x,x)));if(DATA[g.value].teams.includes('OK저축은행'))t.value='OK저축은행'}function key(i){return g.value+'_'+i}function setResult(i,a,b){state[key(i)]=[a,b];render();calc()}function render(){const box=document.getElementById('matches');box.innerHTML=DATA[g.value].matches.map((m,i)=>{const fixed=m[3]!=null;const r=fixed?[m[3],m[4]]:(state[key(i)]||[null,null]);return `<div class="match"><strong>${m[0]} ${m[1]} vs ${m[2]}</strong><div>${r[0]==null?'미확정':r[0]+'-'+r[1]}</div>${fixed?'':`<div class="score"><button class="a" onclick="setResult(${i},3,0)">${m[1]} 3-0</button><button class="a" onclick="setResult(${i},3,1)">${m[1]} 3-1</button><button class="a" onclick="setResult(${i},3,2)">${m[1]} 3-2</button><button class="b" onclick="setResult(${i},0,3)">${m[2]} 3-0</button><button class="b" onclick="setResult(${i},1,3)">${m[2]} 3-1</button><button class="b" onclick="setResult(${i},2,3)">${m[2]} 3-2</button></div>`}</div>`}).join('')}
function calc(){const teams=DATA[g.value].teams,st={};teams.forEach(x=>st[x]={w:0,l:0,pf:0,pa:0,sf:0,sa:0});DATA[g.value].matches.forEach((m,i)=>{const r=m[3]!=null?[m[3],m[4]]:state[key(i)];if(!r)return;const [a,b]=r;st[m[1]].sf+=a;st[m[1]].sa+=b;st[m[2]].sf+=b;st[m[2]].sa+=a;if(a>b){st[m[1]].w++;st[m[2]].l++}else{st[m[2]].w++;st[m[1]].l++}const ptsA=a===3?(b===2?105:b===1?98:75):(a===2?100:a===1?80:60),ptsB=b===3?(a===2?105:a===1?98:75):(b===2?100:b===1?80:60);st[m[1]].pf+=ptsA;st[m[1]].pa+=ptsB;st[m[2]].pf+=ptsB;st[m[2]].pa+=ptsA});const arr=teams.map(team=>({team,...st[team],pr:st[team].pa?st[team].pf/st[team].pa:0,sr:st[team].sa?st[team].sf/st[team].sa:999})).sort((a,b)=>b.w-a.w||b.pr-a.pr||b.sr-a.sr);document.getElementById('rank').innerHTML=arr.map((r,i)=>`<tr class="${i<2?'top2 ':''}${r.team===t.value?'target':''}"><td>${i+1}</td><td>${r.team}</td><td>${r.w}</td><td>${r.l}</td><td>${r.pf}</td><td>${r.pa}</td><td>${r.pr.toFixed(3)}</td><td>${r.sf}</td><td>${r.sa}</td><td>${r.sr===999?'∞':r.sr.toFixed(3)}</td></tr>`).join('');const rank=arr.findIndex(x=>x.team===t.value)+1;document.getElementById('headline').textContent=`${t.value} 현재 계산 순위: ${rank}위 → ${rank<=2?'본선 진출권':'본선 탈락권'}`}
function resetFuture(){Object.keys(state).forEach(k=>delete state[k]);render();calc()}g.onchange=()=>{setupTeams();render();calc()};t.onchange=calc;setupTeams();render();calc();
</script></body></html>
