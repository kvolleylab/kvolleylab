<section class="pc-hero">

<section id="compareArea" class="pc-compare"><div class="pc-empty">비교할 선수 두 명을 선택하세요.</div></section>
</main>
<footer class="site-footer">© 2026 K-Volley Lab. Korean Volleyball Data & Analytics.</footer>
