<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>국내 선수 검색 | K-Volley Lab</title>
  <link rel="stylesheet" href="../assets/css/domestic.css">
</head>
<body>
<header>
  <div class="logo">K-Volley Lab</div>
  <nav>
    <a href="../index.html">Home</a><a href="../vnl.html">VNL</a><a href="../players.html">Players</a><a href="../schedules.html">Schedules</a><a class="active" href="index.html">국내 선수 DB</a>
  </nav>
</header>
<section class="hero"><h1>국내 선수 검색</h1><p>공통 Player Master와 국내 소속 데이터를 연결한 국내 선수 DB입니다.</p></section>
<main class="container">
  <div class="searchbar">
    <input id="q" placeholder="선수명, 코드, 학교, 포지션 검색">
    <select id="level"><option value="">전체 단계</option><option>대학</option></select>
    <select id="pos"><option value="">전체 포지션</option><option>OH</option><option>OP</option><option>MB</option><option>S</option><option>L</option></select>
  </div>
  <p id="count" class="muted"></p><section id="list" class="grid"></section>
</main>
<footer>© 2026 K-Volley Lab.</footer>
<script>
let players=[];
const safe=v=>(v===undefined||v===null||v==="")?"-":v;
async function load(){
  try{
    const [master,roster]=await Promise.all([
      fetch("../data/master/player_master.json?v=2").then(r=>{if(!r.ok)throw new Error(`Master HTTP ${r.status}`);return r.json()}),
      fetch("../data/domestic/inha_roster_2026.json?v=1").then(r=>{if(!r.ok)throw new Error(`Roster HTTP ${r.status}`);return r.json()})
    ]);
    const rosterMap=new Map(roster.map(r=>[r.player_id,r]));
    players=master.filter(p=>rosterMap.has(p.system?.player_id)).map(p=>({
      player_id:p.system?.player_id||"",display_code:p.system?.display_code||"",name_ko:p.identity?.name_ko||"",name_en:p.identity?.name_en||"",birth_date:p.identity?.birth_date||"",height_cm:p.physical?.height_cm||"",weight_kg:p.physical?.weight_kg||"",...(rosterMap.get(p.system?.player_id)||{})
    }));
    render();
  }catch(error){document.getElementById("count").textContent="데이터를 불러오지 못했습니다.";document.getElementById("list").innerHTML=`<article class="card"><h3>불러오기 오류</h3><p>${error.message}</p></article>`;}
}
function render(){
  const q=document.getElementById("q").value.trim().toLowerCase(),level=document.getElementById("level").value,pos=document.getElementById("pos").value;
  const arr=players.filter(p=>{const text=[p.player_id,p.display_code,p.name_ko,p.name_en,p.team_name,p.school_name,p.primary_position,p.sub_position].join(" ").toLowerCase();return(!q||text.includes(q))&&(!level||p.level===level)&&(!pos||p.primary_position===pos||p.sub_position===pos)});
  document.getElementById("count").textContent=`검색 결과 ${arr.length}명 / 전체 ${players.length}명`;
  document.getElementById("list").innerHTML=arr.map(p=>`<article class="card"><h3>${safe(p.name_ko)} <span class="muted">${p.name_en||""}</span></h3><p><span class="badge">${safe(p.player_id)}</span><span class="badge">${safe(p.display_code)}</span></p><p>소속: ${safe(p.team_name)}<br>단계: ${safe(p.level)}<br>포지션: ${safe(p.primary_position)}${p.sub_position?` / ${p.sub_position}`:""} · 키: ${safe(p.height_cm)}cm</p><a class="btn" href="profile.html?id=${encodeURIComponent(p.player_id)}">프로필 보기</a></article>`).join("")||"<p>검색 결과가 없습니다.</p>";
}
["q","level","pos"].forEach(id=>document.getElementById(id).addEventListener("input",render));["level","pos"].forEach(id=>document.getElementById(id).addEventListener("change",render));load();
</script>
</body></html>
