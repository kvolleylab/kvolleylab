<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>국내 선수 검색 | K-Volley Lab</title>
  <link rel="stylesheet" href="../assets/css/domestic.css">
</head>
<body>
<header>
  <div class="logo">K-Volley Lab</div>
  <nav>
    <a href="../index.html">Home</a>
    <a href="../vnl.html">VNL</a>
    <a href="../players.html">Players</a>
    <a href="../schedules.html">Schedules</a>
    <a class="active" href="index.html">국내 선수 DB</a>
  </nav>
</header>
<section class="hero">
  <h1>국내 선수 검색</h1>
  <p>2026 대학배구 인하대학교 선수 16명을 실제 seed 데이터로 연결한 국내 선수 DB v1입니다.</p>
</section>
<main class="container">
  <div class="searchbar">
    <input id="q" placeholder="선수명, 코드, 학교, 포지션 검색">
    <select id="level"><option value="">전체 단계</option><option>대학</option></select>
    <select id="pos"><option value="">전체 포지션</option><option>OH</option><option>OP</option><option>MB</option><option>S</option><option>L</option></select>
  </div>
  <p class="muted">현재 데이터 상태: 검토용 seed · 정식 player_id 부여 전</p>
  <p id="count" class="muted"></p>
  <section id="list" class="grid"></section>
</main>
<footer>© 2026 K-Volley Lab.</footer>
<script>
let players=[];
const safe=v=>(v===undefined||v===null||v==="")?"-":v;
function normalize(p){
  return {
    player_id:p.system?.player_id||"",
    display_code:p.system?.display_code||"",
    id_status:p.system?.id_status||"",
    data_confidence:p.system?.data_confidence||"",
    name_ko:p.identity?.name_ko||"",
    name_en:p.identity?.name_en||"",
    birth_date:p.identity?.birth_date||"",
    nationality:p.identity?.nationality||"",
    current_level:p.classification?.current_level||"",
    current_team:p.classification?.current_team_name||"",
    primary_position:p.classification?.primary_position||"",
    sub_position:p.classification?.sub_position||"",
    height_cm:p.physical?.height_cm||"",
    weight_kg:p.physical?.weight_kg||""
  };
}
async function load(){
  try{
    const raw=await fetch("../data/player_master_seed_domestic_univ_inha_2026_v1.json?v=1").then(r=>{
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    });
    players=raw.map(normalize);
    render();
  }catch(error){
    document.getElementById("count").textContent="데이터를 불러오지 못했습니다.";
    document.getElementById("list").innerHTML=`<article class="card"><h3>불러오기 오류</h3><p>${error.message}</p></article>`;
  }
}
function render(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const level=document.getElementById("level").value;
  const pos=document.getElementById("pos").value;
  const arr=players.filter(p=>{
    const text=[p.player_id,p.display_code,p.name_ko,p.name_en,p.current_team,p.primary_position,p.sub_position].join(" ").toLowerCase();
    const positionMatch=!pos||p.primary_position===pos||p.sub_position===pos;
    return (!q||text.includes(q))&&(!level||p.current_level===level)&&positionMatch;
  });
  document.getElementById("count").textContent=`검색 결과 ${arr.length}명 / 전체 ${players.length}명`;
  document.getElementById("list").innerHTML=arr.map(p=>`
    <article class="card">
      <h3>${safe(p.name_ko)} <span class="muted">${p.name_en||""}</span></h3>
      <p><span class="badge">${safe(p.player_id)}</span><span class="badge">${safe(p.display_code)}</span></p>
      <p>소속: ${safe(p.current_team)}<br>단계: ${safe(p.current_level)}<br>포지션: ${safe(p.primary_position)}${p.sub_position?` / ${p.sub_position}`:""} · 키: ${safe(p.height_cm)}cm</p>
      <p class="muted">ID 상태: ${safe(p.id_status)} · 검수 상태: ${safe(p.data_confidence)}</p>
      <a class="btn" href="profile.html?id=${encodeURIComponent(p.player_id)}">프로필 보기</a>
    </article>
  `).join("")||"<p>검색 결과가 없습니다.</p>";
}
["q","level","pos"].forEach(id=>document.getElementById(id).addEventListener("input",render));
["level","pos"].forEach(id=>document.getElementById(id).addEventListener("change",render));
load();
</script>
</body>
</html>
