<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>국내 선수 검색 | K-Volley Lab</title>
  <link rel="stylesheet" href="../assets/css/domestic.css">
</head>
<body>

<header>
  <div class="logo">K-Volley Lab</div>
  <nav>
    <a href="../index.html">Home</a>
    <a href="../vnl.html">VNL</a>
    <a href="../players.html">Players</a>
    <a href="../schedules.html">Schedules</a>
    <a class="active" href="index.html">국내 선수 DB</a>
  </nav>
</header>

<section class="hero">
  <h1>국내 선수 검색</h1>
  <p>player_master.json과 domestic_players.json을 연결해 국내 선수의 현재 정보와 고유 코드를 검색합니다.</p>
</section>
<main class="container">
  <div class="searchbar">
    <input id="q" placeholder="선수명, 코드, 학교, 포지션 검색">
    <select id="level"><option value="">전체 단계</option><option>초등</option><option>중등</option><option>고등</option><option>대학</option><option>실업</option><option>프로</option></select>
    <select id="pos"><option value="">전체 포지션</option><option>OH</option><option>OP</option><option>MB</option><option>S</option><option>L</option></select>
  </div>
  <p id="count" class="muted"></p>
  <section id="list" class="grid"></section>
</main>
<footer>© 2026 K-Volley Lab.</footer>
<script>
let master=[], domestic=[];
async function load(){
  [master, domestic] = await Promise.all([
    fetch("../data/player_master.json?v=1").then(r=>r.json()),
    fetch("../data/domestic_players.json?v=1").then(r=>r.json())
  ]);
  render();
}
function merged(){
  const dmap = new Map(domestic.map(d=>[d.player_id,d]));
  return master.map(p=>({...p,...(dmap.get(p.player_id)||{})}));
}
function render(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const level=document.getElementById("level").value;
  const pos=document.getElementById("pos").value;
  const arr=merged().filter(p=>{
    const text=[p.player_id,p.display_code,p.name_ko,p.name_en,p.current_team,p.current_school,p.primary_position,p.current_position].join(" ").toLowerCase();
    return (!q||text.includes(q)) && (!level||p.current_level===level) && (!pos||p.primary_position===pos||p.current_position===pos);
  });
  document.getElementById("count").textContent=`검색 결과 ${arr.length}명 / 전체 ${master.length}명`;
  document.getElementById("list").innerHTML=arr.map(p=>`
    <article class="card">
      <h3>${p.name_ko} <span class="muted">${p.name_en||""}</span></h3>
      <p><span class="badge">${p.player_id}</span><span class="badge">${p.display_code||"display_code 검토중"}</span></p>
      <p>현재: ${p.current_team||"-"}<br>단계: ${p.current_level||"-"}<br>포지션: ${p.current_position||p.primary_position||"-"} · 키: ${p.height_cm||"-"}cm</p>
      <a class="btn" href="profile.html?id=${p.player_id}">프로필 보기</a>
      <a class="btn ghost" href="timeline.html?id=${p.player_id}">타임라인</a>
    </article>
  `).join("") || "<p>검색 결과가 없습니다.</p>";
}
["q","level","pos"].forEach(id=>document.getElementById(id).addEventListener("input",render));
["level","pos"].forEach(id=>document.getElementById(id).addEventListener("change",render));
load();
</script>
</body>
</html>
