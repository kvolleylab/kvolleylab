<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>선수 프로필 | K-Volley Lab</title>
  <link rel="stylesheet" href="domestic-style.css" />
  <style>
    .profile-layout{display:grid;grid-template-columns:1.25fr .95fr;gap:22px;margin-top:30px}.table{width:100%;border-collapse:collapse;overflow:hidden;border-radius:14px;background:rgba(255,255,255,.08)}.table th,.table td{padding:14px;border-bottom:1px solid rgba(255,255,255,.12);text-align:left}.table th{color:#d6b25e;width:34%}.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:18px}.stat b{display:block;color:#d6b25e;font-size:28px;margin-bottom:6px}.source-list{margin-top:18px}.source{padding:14px;border:1px solid rgba(255,255,255,.12);border-radius:14px;margin-bottom:10px;background:rgba(255,255,255,.05)}@media(max-width:820px){.profile-layout{grid-template-columns:1fr}.stat-grid{grid-template-columns:1fr}}
  </style>
  <script src="assets/js/unified-nav.js" defer></script>
  <link rel="stylesheet" href="assets/css/site-theme-light.css" />
</head>
<body>
<header>
  <div class="logo">K-Volley Lab</div>
  <nav>
    <a href="index.html">Home</a><a href="domestic-db.html">국내 선수 DB</a><a href="vnl.html">VNL</a><a href="player-search.html">선수 검색</a><a href="pamphlet-archive.html">팜플렛</a><a href="schedules.html">일정</a>
  </nav>
</header>
<main>
  <div class="eyebrow">Domestic Player Profile · JSON v2</div>
  <h1 id="playerName">선수 프로필</h1>
  <p id="summary">선수 데이터를 불러오는 중입니다.</p>

  <div class="actions">
    <a class="btn ghost" href="player-search.html">검색으로 돌아가기</a>
    <a id="timelineLink" class="btn" href="growth-timeline.html">성장 타임라인 보기</a>
  </div>

  <section class="profile-layout">
    <article class="card">
      <h3>기본 정보</h3>
      <table class="table"><tbody id="profileTable"></tbody></table>
    </article>
    <article class="card">
      <h3>추적 포인트</h3>
      <div class="stat-grid" id="statGrid"></div>
      <p>키 변화, 포지션 변화, 대회 출전, 수상 이력, 진학 경로, 대표 경력을 출처 기반으로 누적하는 구조입니다.</p>
    </article>
  </section>

  <section style="margin-top:28px">
    <h2>성장 이력 요약</h2>
    <div id="growthCards" class="grid"></div>
  </section>

  <section style="margin-top:28px">
    <h2>출처 기록</h2>
    <div id="sourceList" class="source-list"></div>
  </section>
</main>
<script>
const params = new URLSearchParams(location.search);
const playerId = params.get("id") || "KVL-000001";
const safe = v => (v === undefined || v === null || v === "") ? "-" : v;

async function loadProfile(){
  const [players, growth, sources] = await Promise.all([
    fetch("players.json").then(r=>r.json()),
    fetch("growth_history.json").then(r=>r.json()),
    fetch("sources.json").then(r=>r.json())
  ]);
  const player = players.find(p=>p.player_id===playerId) || players[0];
  const histories = growth.filter(g=>g.player_id===player.player_id).sort((a,b)=>a.year-b.year);
  const sourceMap = new Map(sources.map(s=>[s.source_id,s]));
  const playerSources = [...new Set([...(player.source_ids||[]), ...histories.map(h=>h.source_id).filter(Boolean)])].map(id=>sourceMap.get(id)).filter(Boolean);
  const heights = histories.map(h=>h.height_cm).filter(Boolean);
  const heightChange = heights.length >= 2 ? `+${Math.max(...heights)-Math.min(...heights)}cm` : "-";
  const levels = histories.map(h=>h.level).join(" → ") || player.current_level;

  document.title = `${player.name_ko} | K-Volley Lab`;
  document.getElementById("playerName").innerHTML = `${player.name_ko} <span class="meta">${player.position}</span>`;
  document.getElementById("summary").textContent = `${player.name_en} · ${player.current_team} · ${player.height_cm}cm · ${player.birth_year}년생`;
  document.getElementById("timelineLink").href = `growth-timeline.html?id=${player.player_id}`;

  document.getElementById("profileTable").innerHTML = [
    ["선수 ID", player.player_id], ["이름", player.name_ko], ["영문명", player.name_en], ["출생 연도", player.birth_year],
    ["현재 소속", player.current_team], ["현재 단계", player.current_level], ["주 포지션", player.position], ["부 포지션", player.sub_position],
    ["현재 신장", `${player.height_cm}cm`], ["성장 경로", levels]
  ].map(([k,v])=>`<tr><th>${k}</th><td>${safe(v)}</td></tr>`).join("");

  document.getElementById("statGrid").innerHTML = [
    [heightChange, "기록상 키 변화"], [safe(player.position), "주 포지션"], [histories.length, "성장 기록"], [playerSources.length, "출처 기록"]
  ].map(([n,t])=>`<div class="stat"><b>${n}</b><span>${t}</span></div>`).join("");

  document.getElementById("growthCards").innerHTML = histories.map(h=>`<article class="card"><div class="eyebrow">${h.year} · ${h.level}</div><h3>${h.team}</h3><p>${h.position} · ${h.height_cm}cm · 등번호 ${safe(h.jersey_number)}</p><p>${safe(h.note)}</p></article>`).join("") || `<p>등록된 성장 이력이 없습니다.</p>`;

  document.getElementById("sourceList").innerHTML = playerSources.map(s=>`<div class="source"><b>${s.title}</b><p class="small">${s.year} · ${s.source_type} · ${safe(s.organization)}</p><p>${safe(s.memo)}</p></div>`).join("") || `<p>등록된 출처가 없습니다.</p>`;
}
loadProfile();
</script>
</body>
</html>
