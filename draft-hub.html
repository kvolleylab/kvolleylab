<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/site-theme-light.css">

<body class="draft-hub-page">
<header class="site-header"><a class="site-logo" href="index.html">K-Volley Lab</a><nav class="site-nav"></nav></header>
<main class="dh-main">
<section class="dh-hero"><p class="eyebrow">UNIVERSITY DRAFT BOARD</p><h1>Draft Hub</h1><p>검수된 대학 선수 DB에서 4학년 드래프트 대상자를 포지션·학교·신장 기준으로 확인합니다.</p><div id="dhSummary" class="dh-summary">드래프트 데이터를 불러오는 중입니다.</div></section>
<section class="dh-controls">
<input id="dhSearch" type="search" placeholder="선수명 또는 학교 검색...">
<select id="dhPosition"><option value="All">전체 포지션</option><option>S</option><option>OH</option><option>OP</option><option>MB</option><option>L</option></select>
<select id="dhSchool"><option value="All">전체 학교</option></select>
<select id="dhHeight"><option value="0">전체 신장</option><option value="185">185cm 이상</option><option value="190">190cm 이상</option><option value="195">195cm 이상</option><option value="200">200cm 이상</option></select>
<select id="dhSort"><option value="position">포지션 순</option><option value="heightDesc">신장 높은 순</option><option value="school">학교 순</option><option value="name">이름 순</option></select>
</section>
<section id="dhStats" class="dh-stats"></section>
<div class="dh-head"><strong id="dhCount">대상 0명</strong><span>현재 기준: 대학 4학년 · 공식 참가 여부는 추후 별도 검증</span></div>
<section id="dhGrid" class="dh-grid"><div class="dh-empty">데이터를 불러오는 중입니다.</div></section>
</main>
<footer class="site-footer">© 2026 K-Volley Lab. Korean Volleyball Data & Analytics.</footer>
