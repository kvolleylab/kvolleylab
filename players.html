<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Search | K-Volley Lab</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
}

h1{
    margin:0;
    color:#fbbf24;
}

.search-box{
    max-width:700px;
    margin:30px auto;
    text-align:center;
}

input{
    width:80%;
    padding:14px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

.player-grid{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
}

.card h3{
    margin-top:0;
    color:#fbbf24;
}

.country{
    color:#93c5fd;
}

a{
    color:#fbbf24;
    text-decoration:none;
}

.top-menu{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#111827;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#fbbf24;
}

.top-menu nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.top-menu nav a:hover{
    color:#fbbf24;
}

.filters{
    text-align:center;
    margin-bottom:20px;
}

.filters button{
    margin:5px;
    padding:10px 18px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:white;
    cursor:pointer;
}

.filters button:hover{
    background:#fbbf24;
    color:black;
}

</style>
</head>

<body>

<header class="top-menu">
    <div class="logo">K-Volley Lab</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="vnl.html">VNL</a>
        <a href="players.html">Players</a>
        <a href="#">Simulator</a>
        <a href="#">Transfers</a>
    </nav>
</header>

<header>
<h1>K-Volley Lab Player Search</h1>

<div id="stats" style="margin-top:15px;color:#94a3b8;">
Loading...
</div>

</header>

<div class="search-box">
<input type="text" id="searchInput" placeholder="선수 이름 검색...">
</div>

<div class="filters">
<button onclick="filterCountry('All')">All</button>
<button onclick="filterCountry('Japan')">Japan</button>
<button onclick="filterCountry('Brazil')">Brazil</button>
<button onclick="filterCountry('Poland')">Poland</button>
</div>

<div class="filters">
<button onclick="filterPosition('All')">ALL</button>
<button onclick="filterPosition('OH')">OH</button>
<button onclick="filterPosition('MB')">MB</button>
<button onclick="filterPosition('S')">S</button>
<button onclick="filterPosition('O')">O</button>
<button onclick="filterPosition('L')">L</button>
</div>

<div class="player-grid" id="playerGrid"></div>

<script>

let players = [];
let selectedCountry = "All";
let selectedPosition = "All";

fetch("players.json")
  .then(response => response.json())
  .then(data => {

      players = data;

      renderPlayers(players);

      const countries =
          [...new Set(players.map(p => p.country))];

      document.getElementById("stats").innerHTML =
          `Total Players : ${players.length} | Countries : ${countries.length}`;

  });

function getFlag(flag){
const flagMap = {
    "BR":"🇧🇷",
    "JP":"🇯🇵",
    "PL":"🇵🇱",
    "IR":"🇮🇷",
    "US":"🇺🇸",
    "FR":"🇫🇷",
    "IT":"🇮🇹",
    "AR":"🇦🇷",
    "DE":"🇩🇪",
    "CU":"🇨🇺",
    "CA":"🇨🇦",
    "RS":"🇷🇸",
    "SI":"🇸🇮"
};

    return flagMap[flag] || flag || "";
}
    
function renderPlayers(list){

const grid=document.getElementById("playerGrid");

grid.innerHTML=list.map(player=>`

<div class="card">
<h3>#${player.number} ${player.name}</h3>

<div>${player.korean}</div>

<div class="country">${getFlag(player.flag)} ${player.country}</div>

<div>Position : ${player.position}</div>

<div>Height : ${player.height}cm</div>

<div>DOB : ${player.dob || "-"}</div>

<div style="margin-top:10px;">
<a href="${player.volleybox}" target="_blank">
Volleybox →
</a>
</div>

</div>

</div>

`).join("");

}

function filterPosition(position){
    selectedPosition = position;
    applyFilters();
}

function applyFilters(){

    let filtered = players;

    if(selectedCountry !== "All"){
        filtered = filtered.filter(player => player.country === selectedCountry);
    }

    if(selectedPosition !== "All"){
        filtered = filtered.filter(player => player.position === selectedPosition);
    }

    renderPlayers(filtered);
}
    
function filterCountry(country){
    selectedCountry = country;
    applyFilters();
}

document.getElementById("searchInput").addEventListener("keyup",function(){

const value=this.value.toLowerCase();

const filtered=players.filter(player=>

player.name.toLowerCase().includes(value) ||
player.korean.includes(value)

);

renderPlayers(filtered);

});

</script>

</body>
</html>
