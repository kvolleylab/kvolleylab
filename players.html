<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Search | K-Volley Lab</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/site-theme-light.css">
<link rel="stylesheet" href="assets/css/player-search-v2.css">
<link rel="stylesheet" href="assets/css/compare-tray-v1.css">

<style>
.ps-audit{margin:18px 0 0;padding:16px 18px;border:1px solid #f1d29a;border-radius:14px;background:#fff8e8;color:#7c4a03}.ps-audit.is-error{border-color:#fecaca;background:#fff1f2;color:#991b1b}.ps-audit-head{display:flex;justify-content:space-between;gap:14px;align-items:center}.ps-audit-head strong{font-size:15px}.ps-audit-head span{font-size:12px;font-weight:700}.ps-audit-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.ps-audit-grid span{padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.75);font-size:12px}.ps-audit p{margin:10px 0 0;font-size:12px;line-height:1.55}@media(max-width:640px){.ps-audit-head{align-items:flex-start;flex-direction:column}}
</style>
</head>
<body class="player-search-page">
<header class="site-header"><a class="site-logo" href="index.html">K-Volley Lab</a><nav class="site-nav"></nav></header>
<main class="ps-main">
<section class="ps-hero">
<p class="eyebrow">PLAYER MASTER</p>
<h1>Player Search</h1>
<p>국내 대학선수와 VNL 국제선수를 하나의 Player Master에서 검색합니다.</p>
<div id="stats" class="ps-stats">선수 데이터를 불러오는 중입니다.</div>
<div id="playerAuditStatus" class="ps-audit">선수 DB 완성도를 점검하는 중입니다.</div>
<div class="ps-hero-actions"><a href="university-teams.html">대학 팀 분석 · 평균신장 보기</a><a href="draft-hub.html">Draft Hub · 4학년 대상</a><a href="player-compare.html">선수 비교 · Compare</a></div>
</section>
<section class="ps-controls" aria-label="선수 검색 필터">
<input type="search" id="searchInput" placeholder="선수명, 국가, 학교, 생년월일 검색..." autocomplete="off">
<select id="typeFilter" aria-label="선수 구분"><option value="All">국내·국제 전체</option><option value="domestic">국내 선수</option><option value="international">국제 선수</option></select>
<select id="countryFilter" aria-label="국가 필터"><option value="All">전체 국가</option></select>
<select id="schoolFilter" aria-label="학교 필터"><option value="All">전체 학교</option></select>
<select id="gradeFilter" aria-label="학년 필터"><option value="All">전체 학년</option><option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option><option value="4">4학년</option></select>
<select id="positionFilter" aria-label="포지션 필터"><option value="All">전체 포지션</option></select>
<select id="draftFilter" aria-label="드래프트 대상 필터"><option value="All">드래프트 전체</option><option value="eligible">대학 4학년</option></select>
</section>
<div class="ps-result-head"><strong id="resultCount">검색 결과 0명</strong><button type="button" id="clearFilters" class="ps-clear">필터 초기화</button></div>
<section id="playerGrid" class="ps-grid" aria-live="polite"><div class="ps-empty">Player Master를 불러오는 중입니다.</div></section>
</main>
<footer class="site-footer">© 2026 K-Volley Lab. Korean Volleyball Data & Analytics.</footer>
</body>
</html>
