<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Search | K-Volley Lab</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:20px;
    text-align:center;
}

h1{
    margin:0;
    color:#fbbf24;
}

.search-box{
    max-width:700px;
    margin:30px auto;
    text-align:center;
}

input{
    width:80%;
    padding:14px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

.player-grid{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:15px;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    padding:15px;
}

.card h3{
    margin-top:0;
    color:#fbbf24;
}

.country{
    color:#93c5fd;
}

a{
    color:#fbbf24;
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>K-Volley Lab Player Search</h1>
</header>

<div class="search-box">
<input type="text" id="searchInput" placeholder="선수 이름 검색...">
</div>

<div class="player-grid" id="playerGrid"></div>

<script>

const players = [

{
name:"Yuji Nishida",
korean:"유지 니시다",
country:"Japan",
pos:"O",
height:"187",
volleybox:"https://volleybox.net/yuji-nishida-p11693"
},

{
name:"Ran Takahashi",
korean:"란 다카하시",
country:"Japan",
pos:"OH",
height:"188",
volleybox:"https://volleybox.net/ran-takahashi-p49198"
},

{
name:"Yuki Ishikawa",
korean:"유키 이시카와",
country:"Japan",
pos:"OH",
height:"191",
volleybox:"https://volleybox.net/yuki-ishikawa-p705"
},

{
name:"Masahiro Sekita",
korean:"마사히로 세키타",
country:"Japan",
pos:"S",
height:"175",
volleybox:"https://volleybox.net/masahiro-sekita-p11681"
},

{
name:"Ricardo Lucarelli",
korean:"리카르도 루카렐리",
country:"Brazil",
pos:"OH",
height:"196",
volleybox:"https://volleybox.net/ricardo-lucarelli-p218"
},

{
name:"Fernando Kreling",
korean:"페르난도 크렐링",
country:"Brazil",
pos:"S",
height:"186",
volleybox:"https://volleybox.net/fernando-kreling-p3022"
},

{
name:"Darlan Souza",
korean:"다를란 소우자",
country:"Brazil",
pos:"O",
height:"192",
volleybox:"https://volleybox.net/darlan-souza-p29039"
},

{
name:"Wilfredo Leon",
korean:"윌프레도 레온",
country:"Poland",
pos:"OH",
height:"201",
volleybox:"https://volleybox.net/wilfredo-leon-p319"
},

{
name:"Tomasz Fornal",
korean:"토마시 포르날",
country:"Poland",
pos:"OH",
height:"200",
volleybox:"https://volleybox.net/tomasz-fornal-p4105"
},

{
name:"Mateusz Bieniek",
korean:"마테우시 비에니에크",
country:"Poland",
pos:"MB",
height:"210",
volleybox:"https://volleybox.net/mateusz-bieniek-p2692"
}

];

function renderPlayers(list){

const grid=document.getElementById("playerGrid");

grid.innerHTML=list.map(player=>`

<div class="card">
<h3>${player.name}</h3>

<div>${player.korean}</div>

<div class="country">${player.country}</div>

<div>Position : ${player.pos}</div>

<div>Height : ${player.height}cm</div>

<div style="margin-top:10px;">
<a href="${player.volleybox}" target="_blank">
Volleybox →
</a>
</div>

</div>

`).join("");

}

renderPlayers(players);

document.getElementById("searchInput").addEventListener("keyup",function(){

const value=this.value.toLowerCase();

const filtered=players.filter(player=>

player.name.toLowerCase().includes(value) ||
player.korean.includes(value)

);

renderPlayers(filtered);

});

</script>

</body>
</html>
