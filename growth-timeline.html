<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>성장 타임라인 | K-Volley Lab</title>
  <link rel="stylesheet" href="domestic-style.css" />
  <style>
    .timeline{position:relative;margin:36px 0 0;padding-left:28px}.timeline:before{content:"";position:absolute;left:9px;top:0;bottom:0;width:2px;background:#d6b25e}.event{position:relative;margin-bottom:18px}.event:before{content:"";position:absolute;left:-26px;top:22px;width:14px;height:14px;background:#d6b25e;border-radius:50%;box-shadow:0 0 0 5px rgba(214,178,94,.15)}
  </style>
</head>
<body>
<header><div class="logo">K-Volley Lab</div><nav><a href="index.html">Home</a><a href="domestic-db.html">국내 선수 DB</a><a href="vnl.html">VNL</a><a href="player-search.html">선수 검색</a><a href="pamphlet-archive.html">팜플렛</a><a href="schedules.html">일정</a></nav></header>
<main>
  <div class="eyebrow">Growth Timeline · JSON v2</div>
  <h1 id="title">선수 성장 이력 타임라인</h1>
  <p id="summary">초·중·고·대학·실업·프로 단계별 소속, 키 변화, 포지션 변화, 출처 기록을 시간순으로 보여줍니다.</p>
  <div class="actions"><a id="profileLink" class="btn" href="player-profile.html">프로필로 돌아가기</a><a class="btn ghost" href="player-search.html">선수 검색</a></div>
  <section id="timeline" class="timeline"></section>
</main>
<script>
const params = new URLSearchParams(location.search);
const playerId = params.get("id") || "KVL-000001";
const safe = v => (v === undefined || v === null || v === "") ? "-" : v;
async function loadTimeline(){
  const [players, growth, sources] = await Promise.all([
    fetch("players.json").then(r=>r.json()),
    fetch("growth_history.json").then(r=>r.json()),
    fetch("sources.json").then(r=>r.json())
  ]);
  const player = players.find(p=>p.player_id===playerId) || players[0];
  const sourceMap = new Map(sources.map(s=>[s.source_id,s]));
  const histories = growth.filter(g=>g.player_id===player.player_id).sort((a,b)=>a.year-b.year);
  document.title = `${player.name_ko} 성장 타임라인 | K-Volley Lab`;
  document.getElementById("title").textContent = `${player.name_ko} 성장 이력 타임라인`;
  document.getElementById("summary").textContent = `${player.current_team} · ${player.position} · ${player.height_cm}cm · ${player.birth_year}년생`;
  document.getElementById("profileLink").href = `player-profile.html?id=${player.player_id}`;
  document.getElementById("timeline").innerHTML = histories.map(h=>{
    const s = sourceMap.get(h.source_id);
    return `<article class="card event"><div class="eyebrow">${h.year} · ${h.level}</div><h3>${h.team} · ${h.height_cm}cm</h3><p>${h.position} · 등번호 ${safe(h.jersey_number)}<br>${safe(h.note)}</p><div><span class="tag">${safe(s?.source_type)}</span><span class="tag">${safe(s?.title)}</span></div></article>`;
  }).join("") || `<p>등록된 성장 이력이 없습니다.</p>`;
}
loadTimeline();
</script>
</body>
</html>
